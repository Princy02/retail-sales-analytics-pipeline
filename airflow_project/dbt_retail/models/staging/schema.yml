version: 2

sources:
  - name: raw
    database: RETAIL_DB
    schema: raw
    tables:
      - name: store_sales

models:
  - name: stg_store_sales
    description: "Cleaned, typed store sales transactions."
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - not_null
      - name: region
        tests:
          - accepted_values:
              values: ['North', 'South', 'East', 'West']
      - name: sales
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
